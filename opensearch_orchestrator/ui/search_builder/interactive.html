<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>OpenSearch Launchpad - Interactive</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Inter+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles.css" />
  <style>
    /* ── Two-column layout ── */
    .iui-layout {
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* Left search column — scrollable shell inside */
    .iui-search-panel {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      /* gradient background from styles.css body rule */
      background:
        radial-gradient(circle at 12% -20%, rgba(255,255,255,0.67) 0%, transparent 40%),
        radial-gradient(circle at 85% 0%, hsl(204 94% 94%) 0%, transparent 35%),
        linear-gradient(180deg, hsl(204 60% 95%), hsl(204 40% 90%));
    }

    /* The scrollable content area inside the search panel */
    .iui-search-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 20px 14px 24px;
    }

    /* Override .shell max-width so it fills the panel */
    .iui-search-scroll .shell {
      max-width: none;
      margin: 0;
      padding: 0;
      animation: none;
    }

    /* Right chat column */
    .iui-chat-panel {
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      background: hsl(var(--card) / 0.95);
      border-left: none; /* border replaced by drag divider */
    }

    .iui-chat-header {
      padding: 12px 16px;
      border-bottom: 1px solid hsl(var(--border));
      font-weight: 600;
      font-size: 15px;
      color: hsl(var(--foreground));
      background: hsl(var(--card) / 0.92);
    }

    .iui-chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .iui-msg { display: flex; flex-direction: column; }
    .iui-msg.user  { align-items: flex-end; }
    .iui-msg.agent, .iui-msg.error { align-items: flex-start; }

    .iui-msg-label {
      font-size: 11px;
      color: hsl(var(--muted-foreground));
      padding: 0 4px;
      margin-bottom: 2px;
      font-family: var(--font-sans);
    }

    .iui-msg-bubble {
      padding: 10px 14px;
      font-size: 14px;
      line-height: 1.5;
      max-width: 88%;
      white-space: pre-wrap;
      font-family: var(--font-sans);
    }

    .iui-msg.user .iui-msg-bubble {
      background: hsl(var(--primary));
      color: hsl(var(--primary-foreground));
      border-radius: 16px 16px 4px 16px;
    }

    .iui-msg.agent .iui-msg-bubble {
      background: hsl(var(--muted));
      color: hsl(var(--foreground));
      border-radius: 16px 16px 16px 4px;
    }

    .iui-msg.error .iui-msg-bubble {
      background: hsl(var(--destructive) / 0.12);
      color: hsl(var(--destructive));
      border-radius: 16px 16px 16px 4px;
    }

    .iui-thinking {
      align-self: flex-start;
      padding: 10px 14px;
      background: hsl(var(--muted));
      border-radius: 16px 16px 16px 4px;
      font-size: 14px;
      color: hsl(var(--muted-foreground));
      font-family: var(--font-sans);
    }

    .iui-chat-input-area {
      padding: 12px 16px;
      border-top: 1px solid hsl(var(--border));
      background: hsl(var(--card) / 0.92);
    }

    .iui-chat-form {
      display: flex;
      gap: 8px;
    }

    .iui-chat-input {
      flex: 1;
      border: 1px solid hsl(var(--input));
      border-radius: var(--radius-xl);
      padding: 8px 12px;
      font-size: 14px;
      font-family: var(--font-sans);
      background: hsl(var(--background));
      color: hsl(var(--foreground));
      outline: none;
    }

    .iui-chat-input:focus {
      border-color: hsl(var(--primary));
      box-shadow: 0 0 0 2px hsl(var(--primary) / 0.2);
    }

    .iui-chat-hint {
      font-size: 11px;
      color: hsl(var(--muted-foreground));
      margin-top: 6px;
      font-family: var(--font-sans);
    }

    /* Size input inside the panel index-row */
    .iui-size-label {
      font-size: 13px;
      color: hsl(var(--muted-foreground));
      display: flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
      font-family: var(--font-sans);
    }

    .iui-size-input {
      width: 56px;
      border: 1px solid hsl(var(--input));
      border-radius: var(--radius-xl);
      padding: 6px 8px;
      font-size: 13px;
      font-family: var(--font-sans);
      background: hsl(var(--background));
      color: hsl(var(--foreground));
      outline: none;
    }

    /* Result rank badge */
    .iui-result-rank {
      min-width: 26px;
      height: 26px;
      border-radius: 50%;
      background: hsl(var(--muted));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      color: hsl(var(--muted-foreground));
      font-weight: 600;
      flex-shrink: 0;
    }

    .iui-result-body { flex: 1; min-width: 0; }

    .iui-result-id {
      font-size: 11px;
      color: hsl(var(--muted-foreground));
      margin-top: 2px;
      font-family: var(--font-mono);
    }

    .iui-result-json {
      margin-top: 6px;
      padding: 8px;
      background: hsl(var(--secondary));
      border-radius: var(--radius-lg);
      font-size: 12px;
      font-family: var(--font-mono);
      overflow: auto;
      max-height: 200px;
      white-space: pre-wrap;
      word-break: break-all;
      color: hsl(var(--foreground));
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel" src="/interactive-app.jsx"></script>
</body>
</html>
